name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_CMS_STORAGE: jsonbin
          VITE_JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          VITE_JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_ASSET_VERSION: ${{ github.run_number }}-${{ github.sha }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
